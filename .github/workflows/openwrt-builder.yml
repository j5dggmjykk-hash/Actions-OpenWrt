name: 编译kmod-usb-net-ipheth 6.12.74
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: 拉取Lean官方源码
        run: |
          git clone https://github.com/coolsnowwolf/lede
          cd lede

      - name: 更新并安装软件源
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成x86_64配置并选中ipheth驱动
        run: |
          cd lede
          # 生成x86_64平台的默认基础配置
          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          # 必需底层依赖
          echo "CONFIG_PACKAGE_kmod-usb-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nls-base=y" >> .config
          # 苹果iPhone USB共享
          echo "CONFIG_PACKAGE_kmod-usb-net-ipheth=y" >> .config
          # 安卓USB共享
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          # 自动补全所有依赖配置，OpenWrt标准无bug步骤
          make defconfig

      - name: 编译基础环境（工具链+内核）
        run: |
          cd lede
          make tools/compile V=s -j$(nproc)
          make toolchain/compile V=s -j$(nproc)
          make target/linux/compile V=s -j$(nproc)

      - name: 单独编译驱动
        run: |
          cd lede
          make package/kernel/linux/compile V=s -j$(nproc)

      - name: 上传最终所有驱动文件
        uses: actions/upload-artifact@v4
        with:
          name: all-usb-drivers
          path: |
            lede/bin/targets/x86/64/packages/kmod-usb-core*.ipk
            lede/bin/targets/x86/64/packages/kmod-usb-net*.ipk
            lede/bin/targets/x86/64/packages/kmod-nls-base*.ipk
            lede/bin/targets/x86/64/packages/kmod-usb-net-ipheth*.ipk
            lede/bin/targets/x86/64/packages/kmod-usb-net-rndis*.ipk
