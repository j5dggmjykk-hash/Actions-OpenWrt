name: Build ipheth 6.12.74 (修复版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: 拉取Lean源码
        run: |
          git clone https://github.com/coolsnowwolf/lede
          cd lede
          git pull

      - name: 初始化配置与工具链
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          echo "CONFIG_KMOD_USB_NET_IPHETH=y" >> .config
          make olddefconfig
          # 关键：先编译工具链和内核头文件，解决依赖问题
          make tools/compile V=s -j$(nproc)
          make toolchain/compile V=s -j$(nproc)
          make target/linux/compile V=s -j$(nproc)

      - name: 编译ipheth驱动
        run: |
          cd lede
          # 正确的单独编译命令，包含完整依赖路径
          make package/kernel/linux/compile V=s -j$(nproc)

      - name: 上传驱动包
        uses: actions/upload-artifact@v4
        with:
          name: kmod-usb-net-ipheth-6.12.74
          path: lede/bin/targets/x86/64/packages/kmod-usb-net-ipheth*.ipk
