name: Build ipheth 6.12.74
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: sudo apt update && sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget -y

      - name: Clone LEDE
        run: git clone https://github.com/coolsnowwolf/lede

      - name: Config
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          echo "CONFIG_KMOD_USB_NET_IPHETH=y" >> .config

      - name: Compile
        run: |
          cd lede
          make package/kernel/linux/modules/usb/compile V=s -j4

      - uses: actions/upload-artifact@v4
        with:
          name: kmod-usb-net-ipheth
          path: lede/bin/targets/x86/64/packages/*.ipk
